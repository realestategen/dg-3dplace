<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6c63ff"/>
    </linearGradient>
  </defs>
  <!-- rounded square bg -->
  <rect width="64" height="64" rx="14" fill="url(#g)"/>
  <!-- 3D cube outline representing 3DGS -->
  <g fill="none" stroke="#fff" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <!-- front face -->
    <polygon points="32,14 50,24 50,44 32,54 14,44 14,24" stroke-width="2.5" fill="rgba(255,255,255,0.08)"/>
    <!-- vertical center line -->
    <line x1="32" y1="14" x2="32" y2="54"/>
    <!-- left diagonal -->
    <line x1="14" y1="24" x2="32" y2="34"/>
    <!-- right diagonal -->
    <line x1="50" y1="24" x2="32" y2="34"/>
  </g>
  <!-- center dot (gaussian splat) -->
  <circle cx="32" cy="34" r="3.5" fill="#fff" opacity="0.95"/>
</svg>
